<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';">
  <title>区域截屏</title>
  <style>
    /* 区域截屏界面样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
    }
    
    #screenshot-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 半透明遮罩层 */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
    }
    
    /* 选区框 */
    #selection {
      position: fixed;
      border: 2px solid #00d4aa;
      background: transparent;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
      display: none;
      z-index: 10;
    }
    
    /* 尺寸提示 */
    #size-info {
      position: fixed;
      background: rgba(0, 0, 0, 0.75);
      color: #00d4aa;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      z-index: 20;
      display: none;
    }
    
    /* 操作提示 */
    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: #e8e8ec;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      z-index: 30;
    }

    /* 工具栏 */
    #toolbar {
      position: fixed;
      display: none;
      gap: 6px;
      z-index: 20;
      background: rgba(30, 33, 45, 0.95);
      padding: 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .toolbar-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 14px;
      transition: all 0.15s ease;
    }

    .toolbar-btn.confirm {
      background: #00d4aa;
    }
    .toolbar-btn.confirm:hover {
      background: #00f0c0;
    }

    .toolbar-btn.cancel {
      background: rgba(255, 92, 92, 0.8);
    }
    .toolbar-btn.cancel:hover {
      background: #ff5c5c;
    }
  </style>
</head>
<body>
  <img id="screenshot-bg" src="">
  <div id="overlay"></div>
  <div id="selection"></div>
  <div id="size-info"></div>
  <div id="hint">拖拽选择截屏区域，ESC 取消</div>
  <div id="toolbar">
    <button class="toolbar-btn confirm" id="btn-confirm" title="确认">✓</button>
    <button class="toolbar-btn cancel" id="btn-cancel-region" title="取消">✕</button>
  </div>

  <script src="scripts/screenshot-region.js"></script>
</body>
</html>
