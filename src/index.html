<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';">
  <title>Desktop AI Assistant</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- 标题栏 -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-title">Desktop AI Assistant</span>
    </div>
    <div class="titlebar-right">
      <button class="titlebar-btn collapse-btn" id="btn-collapse" title="折叠/展开">
        <svg id="collapse-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
      <button class="titlebar-btn settings-btn" id="btn-settings" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button class="titlebar-btn" id="btn-minimize" title="最小化">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="titlebar-btn close-btn" id="btn-close" title="关闭">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- 主内容区域 -->
  <div class="main-container" id="main-container">
    <!-- 聊天区域 -->
    <div class="chat-container" id="chat-container">
      <!-- 欢迎消息 -->
      <div class="welcome-message" id="welcome-message">
        <div class="welcome-emoji">👋</div>
        <div class="welcome-title">你好！</div>
        <div class="welcome-subtitle">我是你的 AI 助手，可以回答问题、分析截图。</div>
        <div class="welcome-hint">输入消息开始对话，或点击截图按钮捕获屏幕区域。</div>
      </div>
    </div>

    <!-- 图片预览区 -->
    <div class="image-preview-container" id="image-preview-container" style="display: none;">
      <div class="image-preview-wrapper">
        <img id="image-preview" src="" alt="预览图片">
        <button class="image-remove-btn" id="btn-remove-image" title="移除图片">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-container">
      <button class="input-action-btn" id="btn-screenshot" title="截屏 (Alt+S)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
      <button class="input-action-btn" id="btn-upload" title="上传图片">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="12" y1="8" x2="12" y2="16"></line>
          <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
      </button>
      <div class="input-wrapper">
        <textarea class="message-input" id="message-input" placeholder="输入消息... (Enter 发送)" rows="1"></textarea>
      </div>
      <button class="send-btn" id="btn-send" title="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-overlay" id="settings-overlay" style="display: none;">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="settings-close-btn" id="btn-settings-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <!-- API 配置 -->
        <div class="settings-section">
          <h3>API 配置</h3>
          <div class="settings-field">
            <label for="setting-api-url">API 地址 <small style="color: #888; font-weight: normal;">（输入基础地址即可，如 https://api.example.com/v1）</small></label>
            <input type="text" id="setting-api-url" placeholder="https://api.openai.com/v1">
          </div>
          <div class="settings-field">
            <label for="setting-api-key">API Key</label>
            <div class="password-field">
              <input type="password" id="setting-api-key" placeholder="sk-...">
              <button class="toggle-password" id="btn-toggle-password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          <div class="settings-field">
            <label for="setting-model">模型</label>
            <input type="text" id="setting-model" placeholder="gpt-4o">
          </div>
          <div class="settings-field">
            <label for="setting-max-tokens">最大输出 Token <small style="color: #888; font-weight: normal;">（越小响应越快，建议 1024~2048）</small></label>
            <input type="number" id="setting-max-tokens" placeholder="2048" min="256" max="8192" step="256">
          </div>
        </div>

        <!-- 连接测试 -->
        <div class="settings-section">
          <h3>连接测试</h3>
          <div class="settings-field">
            <button class="btn-test" id="btn-test-connection">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
              <span>测试 API 连接</span>
            </button>
            <div class="test-result" id="test-result" style="display: none;"></div>
          </div>
        </div>

        <!-- 代理配置 -->
        <div class="settings-section">
          <h3>代理配置</h3>
          <div class="settings-field settings-field-row">
            <label for="setting-proxy-enabled">启用代理</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-proxy-enabled">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-field settings-field-row" id="proxy-details">
            <div class="proxy-input-group">
              <div>
                <label for="setting-proxy-host">代理地址</label>
                <input type="text" id="setting-proxy-host" placeholder="127.0.0.1">
              </div>
              <div>
                <label for="setting-proxy-port">端口</label>
                <input type="text" id="setting-proxy-port" placeholder="7890">
              </div>
            </div>
          </div>
        </div>

        <!-- 窗口配置 -->
        <div class="settings-section">
          <h3>窗口配置</h3>
          <div class="settings-field settings-field-row">
            <label for="setting-always-top">窗口置顶</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-always-top">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-field">
            <label for="setting-opacity">窗口透明度</label>
            <div class="range-field">
              <input type="range" id="setting-opacity" min="0.3" max="1" step="0.05">
              <span id="opacity-value">0.95</span>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-footer">
        <button class="btn-save" id="btn-save-settings">保存</button>
        <button class="btn-cancel" id="btn-cancel-settings">取消</button>
      </div>
    </div>
  </div>

  <script src="scripts/renderer.js"></script>
</body>
</html>
